<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>YouTube Tab Sort Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <h2>YouTube Tab Sort <span id="version" class="version-text"></span></h2>

  <div class="setting-group">
    <label for="apiKey">YouTube Data API v3 Key:</label>
    <input type="password" id="apiKey" placeholder="Enter API Key">
    <p class="help-text">
      An API key is required to fetch uploader, publish date, and duration.
      <a href="https://developers.google.com/youtube/v3/getting-started" target="_blank">Get one here</a>.
    </p>
  </div>

  <button id="saveBtn">Save Settings</button>
  <div id="status"></div>

  <div id="error-container" style="display: none;" class="error-container">
    <div class="error-header">
      <span id="error-time"></span>
      <button id="error-close" title="Dismiss">&times;</button>
    </div>
    <div id="error-msg"></div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
